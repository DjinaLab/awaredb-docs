# Cloudflare Workers + Static Assets configuration.
# docs.awaredb.io is a static Starlight build — no Worker runtime code; the
# `[assets]` block tells the Workers runtime to serve `dist/` directly.
#
# Project settings on the Cloudflare dashboard:
#   Build command:        npm run build
#   Deploy command:       npx wrangler deploy
#   Environment variable: NODE_VERSION = 22
name = "awaredb-docs"
compatibility_date = "2026-05-20"

[assets]
directory = "./dist"
not_found_handling = "404-page"
